<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Memory Capsule - Payment</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #f3d1e3, #c7a3ff);
}

/* Header */
.header {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Main container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

/* Card layout */
.payment-box {
    display: flex;
    width: 800px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

/* Left section */
.left {
    width: 50%;
    padding: 20px;
}

.payment-methods {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.payment-methods button {
    padding: 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Input fields */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

/* Row inputs */
.row {
    display: flex;
    gap: 10px;
}

/* Pay button */
.pay-btn {
    width: 100%;
    padding: 12px;
    background: purple;
    color: white;
    border: none;
    border-radius: 20px;
    margin-top: 10px;
    cursor: pointer;
}

/* Right section */
.right {
    width: 50%;
    background: rgba(255,255,255,0.3);
    padding: 20px;
}

.summary h3 {
    margin-bottom: 15px;
}

.item {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

.total {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    Digital Memory Capsule
</div>

<div class="container">
    <div class="payment-box">

        <!-- LEFT SIDE -->
        <div class="left">
            <div class="payment-methods">
                <button>Credit Card</button>
                <button>PayPal</button>
                <button>Crypto</button>
                <button>Google Pay</button>
            </div>

            <input type="text" placeholder="Card Number">

            <div class="row">
                <input type="text" placeholder="MM/YY">
                <input type="text" placeholder="CVV">
            </div>

            <input type="text" placeholder="Card Holder Name">

            <button class="pay-btn">Pay Now ₹19.99</button>
            <p style="text-align:center;">Secure Payment</p>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <div class="summary">
                <h3>Summary</h3>

                <div class="item">
                    <span>Gaming Monitor</span>
                    <span>₹1399.98</span>
                </div>

                <div class="item">
                    <span>Wireless Mouse</span>
                    <span>₹149.99</span>
                </div>

                <div class="item">
                    <span>Keyboard</span>
                    <span>₹199.99</span>
                </div>

                <div class="item total">
                    <span>Total</span>
                    <span>₹1749.96</span>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
